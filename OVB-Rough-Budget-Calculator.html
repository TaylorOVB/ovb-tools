<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>OVB — Rough Budget Calculator</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OVB Tools" />
  <meta name="theme-color" content="#1A1F2E" />
  <link rel="apple-touch-icon" href="https://cdn.prod.website-files.com/680c4e282fbc1c583a3a7cc2/69a4a9e940d2f6303215cd3e_OVBear%20(1).png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --near-black: #1E1C1A;
      --card-bg: #2A2826;
      --tan: #C7AA8B;
      --smoke: #F7F7F7;
      --footer-black: #141210;
      --warn: #D4714A;
      --green: #4CAF87;
      --border: rgba(199,170,139,0.12);
    }
    html, body { background: var(--near-black); color: var(--smoke); font-family: 'DM Sans', sans-serif; font-size: 13px; min-height: 100vh; }

    .header { background: var(--footer-black); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header-back { color: var(--tan); font-family: 'DM Mono', monospace; font-size: 11px; text-decoration: none; letter-spacing: 0.06em; opacity: 0.8; }
    .header-center { text-align: center; }
    .header-title { font-size: 15px; font-weight: 600; color: var(--smoke); }
    .header-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--tan); letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.7; margin-top: 2px; }

    .layout { display: grid; grid-template-columns: 400px 1fr; gap: 24px; max-width: 1120px; margin: 0 auto; padding: 24px 24px 100px; align-items: start; }
    @media (max-width: 820px) { .layout { grid-template-columns: 1fr; padding: 16px 16px 120px; } .preview-col { position: static !important; } }

    .section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 12px; overflow: hidden; }
    .section-header { display: flex; align-items: center; gap: 10px; padding: 13px 16px; border-bottom: 1px solid var(--border); }
    .section-num { background: var(--near-black); color: var(--tan); font-family: 'DM Mono', monospace; font-size: 10px; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--smoke); }
    .section-body { padding: 16px; }

    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(247,247,247,0.4); }
    .field input, .field textarea { background: var(--near-black); border: 1px solid var(--border); border-radius: 4px; color: var(--smoke); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 9px 12px; outline: none; width: 100%; transition: border-color 0.15s; }
    .field input:focus, .field textarea:focus { border-color: var(--tan); }
    .field input::placeholder, .field textarea::placeholder { color: rgba(247,247,247,0.2); }
    .field textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .pill-group { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 5px; }
    .pill { background: transparent; border: 1px solid rgba(199,170,139,0.2); border-radius: 4px; color: rgba(247,247,247,0.5); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 7px 13px; transition: all 0.14s; line-height: 1; }
    .pill:hover { border-color: var(--tan); color: var(--smoke); }
    .pill.active { background: var(--near-black); border-color: var(--near-black); color: var(--smoke); }
    .level-desc { margin-top: 6px; font-size: 11px; color: rgba(247,247,247,0.28); font-style: italic; line-height: 1.4; }
    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    .modifier-row { display: flex; align-items: center; gap: 11px; padding: 10px 12px; background: var(--near-black); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.14s; -webkit-tap-highlight-color: transparent; }
    .modifier-row:hover { border-color: rgba(199,170,139,0.3); }
    .modifier-row.checked { border-color: var(--tan); background: rgba(199,170,139,0.04); }
    .modifier-row:last-of-type { margin-bottom: 0; }
    .mod-check { width: 16px; height: 16px; border: 1.5px solid rgba(199,170,139,0.3); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.14s; }
    .modifier-row.checked .mod-check { background: var(--tan); border-color: var(--tan); }
    .check-mark { width: 8px; height: 5px; border-left: 1.5px solid var(--near-black); border-bottom: 1.5px solid var(--near-black); transform: rotate(-45deg) translateY(-1px); opacity: 0; transition: opacity 0.14s; }
    .modifier-row.checked .check-mark { opacity: 1; }
    .mod-label { font-size: 12px; color: rgba(247,247,247,0.6); flex: 1; line-height: 1.3; }
    .modifier-row.checked .mod-label { color: var(--smoke); }
    .mod-badge { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--tan); background: rgba(199,170,139,0.08); padding: 3px 7px; border-radius: 4px; white-space: nowrap; }
    .mod-badge.negative { color: var(--green); background: rgba(76,175,135,0.08); }
    .mod-note { margin-top: 12px; font-size: 10px; color: rgba(247,247,247,0.22); line-height: 1.5; }
    .modifier-row.locked-row { cursor: default; border-color: rgba(199,170,139,0.35); background: rgba(199,170,139,0.05); opacity: 0.85; }
    .modifier-row.locked-row:hover { border-color: rgba(199,170,139,0.35); }
    .mod-lock { width: 16px; height: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; opacity: 0.6; }
    .mod-badge.locked { color: rgba(199,170,139,0.7); background: rgba(199,170,139,0.06); }
    .pdf-mod-dot.locked { background: rgba(199,170,139,0.4); }
    .pdf-mod-badge.locked { color: rgba(199,170,139,0.6); }

    /* Preview column */
    .preview-col { position: sticky; top: 70px; }
    .preview-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .preview-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(199,170,139,0.5); }
    .btn-dl-top { display: flex; align-items: center; gap: 7px; background: var(--tan); border: none; border-radius: 4px; color: var(--near-black); cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: 0.05em; padding: 9px 18px; transition: all 0.15s; }
    .btn-dl-top:hover { background: #d4bc9d; }
    .btn-dl-top:disabled { opacity: 0.35; cursor: default; }

    .paper-wrap { background: #DDDBD7; border-radius: 4px; padding: 10px; max-height: calc(100vh - 148px); overflow-y: auto; }
    @media (max-width: 820px) { .paper-wrap { max-height: none; } }

    /* White paper */
    .pdf-doc { background: #FFFFFF; font-family: 'DM Sans', sans-serif; color: #1E1C1A; padding: 44px 48px 40px; position: relative; }
    .pdf-header-bar { background: #1E1C1A; margin: -44px -48px 32px; padding: 20px 48px 18px; display: flex; align-items: center; justify-content: space-between; }
    .pdf-logo-row { display: flex; align-items: center; gap: 13px; }
    .pdf-bear { width: 60px; height: 60px; object-fit: contain; mix-blend-mode: screen; }
    .pdf-wordmark { height: 30px; filter: brightness(0) invert(1); opacity: 0.88; }
    .pdf-contact-right { text-align: right; }
    .pdf-contact-line { font-family: 'DM Mono', monospace; font-size: 9px; color: rgba(199,170,139,0.65); letter-spacing: 0.04em; line-height: 1.75; }

    .pdf-eyebrow { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: #C7AA8B; margin-bottom: 5px; }
    .pdf-project-name { font-size: 20px; font-weight: 700; color: #1E1C1A; margin-bottom: 20px; line-height: 1.2; }

    .pdf-meta-grid { display: flex; border: 1px solid #EBEBEB; border-radius: 3px; overflow: hidden; margin-bottom: 26px; }
    .pdf-meta-cell { flex: 1; padding: 9px 13px; border-right: 1px solid #EBEBEB; }
    .pdf-meta-cell:last-child { border-right: none; }
    .pdf-meta-label { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.13em; text-transform: uppercase; color: #AAA; margin-bottom: 3px; }
    .pdf-meta-value { font-size: 11px; font-weight: 600; color: #1E1C1A; }

    .pdf-hero { background: #1E1C1A; border-radius: 3px; padding: 26px 30px; margin-bottom: 22px; display: flex; align-items: center; justify-content: space-between; }
    .pdf-hero-eyebrow { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(199,170,139,0.55); margin-bottom: 8px; }
    .pdf-hero-range { font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 500; color: #C7AA8B; line-height: 1.25; }
    .pdf-hero-mid { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(247,247,247,0.32); margin-top: 5px; }
    .pdf-hero-right { text-align: right; }
    .pdf-psf-label { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(199,170,139,0.4); margin-bottom: 4px; }
    .pdf-psf-value { font-family: 'DM Mono', monospace; font-size: 13px; color: rgba(247,247,247,0.55); }

    .pdf-sec-label { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: #AAA; margin-bottom: 9px; padding-bottom: 6px; border-bottom: 1px solid #EBEBEB; }

    .pdf-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #F2F2F2; }
    .pdf-row:last-child { border-bottom: none; }
    .pdf-row-label { font-size: 12px; color: #555; }
    .pdf-row-value { font-family: 'DM Mono', monospace; font-size: 11px; color: #1E1C1A; }
    .pdf-row.subtotal .pdf-row-label { font-weight: 600; color: #1E1C1A; }
    .pdf-row.subtotal .pdf-row-value { font-weight: 600; }
    .pdf-row.fee .pdf-row-label { color: #C7AA8B; font-weight: 500; }
    .pdf-row.fee .pdf-row-value { color: #C7AA8B; }

    .pdf-total-bar { display: flex; justify-content: space-between; align-items: center; background: #F8F8F6; border: 1.5px solid #1E1C1A; border-radius: 3px; padding: 13px 16px; margin: 6px 0 22px; }
    .pdf-total-label { font-size: 13px; font-weight: 700; }
    .pdf-total-value { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; text-align: right; }

    .pdf-scope-box { font-size: 12px; color: #444; line-height: 1.65; background: #FAFAF8; border-left: 3px solid #C7AA8B; padding: 11px 13px; border-radius: 0 3px 3px 0; margin-bottom: 22px; }

    .pdf-mod-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #F2F2F2; font-size: 12px; color: #555; }
    .pdf-mod-item:last-child { border-bottom: none; }
    .pdf-mod-dot { width: 5px; height: 5px; background: #C7AA8B; border-radius: 50%; flex-shrink: 0; }
    .pdf-mod-dot.negative { background: #4CAF87; }
    .pdf-mod-badge { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 10px; color: #C7AA8B; }
    .pdf-mod-badge.negative { color: #4CAF87; }

    .pdf-value-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; margin-bottom: 22px; }
    .pdf-value-card { border: 1px solid #EBEBEB; border-radius: 3px; padding: 11px 12px; }
    .pdf-value-icon { font-size: 15px; margin-bottom: 5px; }
    .pdf-value-title { font-size: 11px; font-weight: 600; color: #1E1C1A; margin-bottom: 3px; }
    .pdf-value-desc { font-size: 10px; color: #999; line-height: 1.5; }

    .pdf-footer { border-top: 1px solid #EBEBEB; padding-top: 13px; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
    .pdf-disclaimer { font-size: 9px; color: #BFBFBF; line-height: 1.65; max-width: 380px; }
    .pdf-footer-right { text-align: right; flex-shrink: 0; }
    .pdf-footer-url { font-family: 'DM Mono', monospace; font-size: 9px; color: #C7AA8B; }
    .pdf-footer-phone { font-family: 'DM Mono', monospace; font-size: 9px; color: #CCC; margin-top: 3px; }

    .paper-empty { background: white; padding: 60px 24px; text-align: center; border-radius: 2px; }
    .paper-empty-icon { font-size: 38px; opacity: 0.18; margin-bottom: 12px; }
    .paper-empty-text { font-size: 12px; color: #CCC; line-height: 1.7; }

    /* Bottom bar */
    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #E8E8E8; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; z-index: 200; }
    .btn-back-bar { background: transparent; border: 1px solid #DEDEDE; border-radius: 4px; color: #888; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 9px 16px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-right { display: flex; gap: 8px; }
    .btn-reset { background: transparent; border: 1px solid #DEDEDE; border-radius: 4px; color: #999; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 9px 16px; }
    .btn-dl-bar { background: var(--near-black); border: none; border-radius: 4px; color: white; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 9px 20px; transition: background 0.15s; }
    .btn-dl-bar:hover { background: #333; }
    .btn-dl-bar:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState } = React;

  const PSF = {
    'new-construction': {
      label: 'New Construction', icon: '🏗️',
      levels: [
        { value: 'builder', label: 'Builder Grade', low: 185, high: 230, desc: 'Standard finishes, basic fixtures, vinyl plank' },
        { value: 'mid',     label: 'Mid-Grade',     low: 255, high: 360, desc: 'Semi-custom, quartz countertops, LVP or engineered hardwood' },
        { value: 'high',    label: 'High-End',      low: 360, high: 460, desc: 'Custom millwork, natural stone, premium fixtures throughout' },
      ],
      defaultContingency: 7,
      modifiers: ['multi-story','site-access','well-septic','utilities','extra-bath-nc'],
    },
    'addition': {
      label: 'Addition', icon: '➕',
      levels: [
        { value: 'standard', label: 'Standard',  low: 200, high: 260, desc: 'Builder finishes, standard structural tie-in' },
        { value: 'mid',      label: 'Mid-Grade',  low: 270, high: 370, desc: 'Quality finishes matching existing home' },
        { value: 'high',     label: 'High-End',   low: 370, high: 470, desc: 'Custom, matching or exceeding existing quality' },
      ],
      defaultContingency: 10,
      modifiers: ['no-plumbing','add-full-bath','add-master-bath','add-half-bath','multi-story','site-access','structural','pre1980'],
    },
    'remodel': {
      label: 'Remodel / Reno', icon: '🔨',
      levels: [
        { value: 'cosmetic', label: 'Cosmetic',  low: 25,  high: 65,  desc: 'Paint, flooring, fixtures — no structural work' },
        { value: 'standard', label: 'Standard',  low: 100, high: 145, desc: 'Full interior update, kitchens and baths, no structural' },
        { value: 'full',     label: 'Full Gut',  low: 155, high: 260, desc: 'Down to studs, structural changes possible' },
      ],
      defaultContingency: 12,
      modifiers: ['add-full-bath','add-master-bath','add-half-bath','kitchen-reloc','structural','pre1980','basement','site-access'],
    },
    'adu': {
      label: 'ADU', icon: '🏡',
      levels: [
        { value: 'standard', label: 'Standard',  low: 285, high: 340, desc: 'Functional, builder-grade finishes' },
        { value: 'mid',      label: 'Mid-Grade',  low: 315, high: 375, desc: 'Quality finishes, strong rental appeal' },
        { value: 'high',     label: 'High-End',   low: 375, high: 455, desc: 'Premium finishes, luxury rental quality' },
      ],
      defaultContingency: 8,
      modifiers: ['site-access','well-septic'],
    },
    'basement-finish': {
      label: 'Basement Finish', icon: '⬇️',
      levels: [
        { value: 'standard', label: 'Standard',  low: 42,  high: 62,  desc: 'Egress window, LVP, drywall, basic bath rough-in — functional finish' },
        { value: 'mid',      label: 'Mid-Grade',  low: 65,  high: 88,  desc: 'Bedroom, full bath, wet bar area, quality finishes' },
        { value: 'high',     label: 'High-End',   low: 90,  high: 120, desc: 'Home theater, custom bar, ensuite bath, heated floors, premium throughout' },
      ],
      defaultContingency: 12,
      modifiers: ['slab-plumbing','add-full-bath','add-master-bath','add-half-bath','egress-window','pre1980','structural'],
    },
  };

  const MODIFIERS = {
    // ── Slab & plumbing ────────────────────────────────────────────────────
    'slab-plumbing':   { label: 'Slab penetrations & plumbing rough-in modifications', pct: 0, flat: 9000, badge: '+$9K' },
    // ── Cost reducers ──────────────────────────────────────────────────────
    'no-plumbing':     { label: 'Dry addition — no new plumbing or bathrooms (bedroom, office, living space)', pct: -22, flat: 0,     badge: '-22%',  negative: true  },
    // ── Bathroom additions ─────────────────────────────────────────────────
    'add-full-bath':   { label: 'Full bathroom included in scope',                  pct: 0,   flat: 22000, badge: '+$22K' },
    'add-master-bath': { label: 'Master suite / ensuite bath',                      pct: 0,   flat: 38000, badge: '+$38K' },
    'add-half-bath':   { label: 'Half bath / powder room',                          pct: 0,   flat: 9000,  badge: '+$9K'  },
    'extra-bath-nc':   { label: 'Additional full bath beyond standard (2 bath base)',pct: 0,  flat: 20000, badge: '+$20K' },
    'egress-window':   { label: 'Egress window cut & install',                      pct: 0,   flat: 4500,  badge: '+$4.5K'},
    // ── Scope & site ───────────────────────────────────────────────────────
    'kitchen-reloc':   { label: 'Kitchen relocation or new kitchen run',            pct: 15,  flat: 0,     badge: '+15%'  },
    'multi-story':     { label: 'Multi-Story / Complex Layout',                     pct: 12,  flat: 0,     badge: '+12%'  },
    'site-access':     { label: 'Difficult Site / Access Challenges',               pct: 7,   flat: 0,     badge: '+7%'   },
    'structural':      { label: 'Structural Changes Required',                      pct: 15,  flat: 0,     badge: '+15%'  },
    'pre1980':         { label: 'Pre-1980 Home',                                    pct: 13,  flat: 0,     badge: '+13%'  },
    'basement':        { label: 'Basement Involved',                                pct: 10,  flat: 0,     badge: '+10%'  },
    'well-septic':     { label: 'Well & Septic Required',                           pct: 0,   flat: 32000, badge: '+$32K' },
    'utilities':       { label: 'Utility Connections (elec, water, gas)',           pct: 0,   flat: 16000, badge: '+$16K' },
  };

  function getOvbFee(cost) {
    if (cost <= 100000)  return { rate: 22, fee: cost * 0.22 };
    if (cost <= 250000)  return { rate: 20, fee: cost * 0.20 };
    if (cost <= 500000)  return { rate: 18, fee: cost * 0.18 };
    return                      { rate: 16, fee: cost * 0.16 };
  }

  const fmt  = n => n == null ? '—' : '$' + Math.round(n).toLocaleString('en-US');
  const fmtR = (lo, hi) => fmt(lo) + ' – ' + fmt(hi);

  function compute(typeData, levelData, sf, contPct, activeMods) {
    if (!levelData || sf <= 0) return null;
    let baseLow  = levelData.low  * sf;
    let baseHigh = levelData.high * sf;
    let pctMod = 0, flatMod = 0;
    const appliedMods = [];
    (typeData.modifiers || []).forEach(key => {
      if (activeMods[key]) {
        pctMod  += MODIFIERS[key].pct;
        flatMod += MODIFIERS[key].flat;
        appliedMods.push({ key, label: MODIFIERS[key].label, badge: MODIFIERS[key].badge, negative: !!MODIFIERS[key].negative });
      }
    });
    const hardLow  = baseLow  * (1 + pctMod / 100) + flatMod;
    const hardHigh = baseHigh * (1 + pctMod / 100) + flatMod;
    const contLow  = hardLow  * (contPct / 100);
    const contHigh = hardHigh * (contPct / 100);
    const subLow   = hardLow  + contLow;
    const subHigh  = hardHigh + contHigh;
    const { rate: feeRate } = getOvbFee((subLow + subHigh) / 2);
    const feeLow  = subLow  * (feeRate / 100);
    const feeHigh = subHigh * (feeRate / 100);
    const totalLow  = subLow  + feeLow;
    const totalHigh = subHigh + feeHigh;
    return { hardLow, hardHigh, contLow, contHigh, contPct, subLow, subHigh, feeLow, feeHigh, feeRate, totalLow, totalHigh, totalMid: (totalLow + totalHigh) / 2, psfLow: totalLow / sf, psfHigh: totalHigh / sf, appliedMods };
  }

  function PdfDoc({ clientName, sqft, finishLevel, scopeNotes, calc, typeData, levelData }) {
    const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    const sf = parseFloat(sqft) || 0;
    const displayName = clientName ? clientName + ' — Budget Estimate' : 'Project Budget Estimate';

    return (
      <div id="pdf-output" className="pdf-doc">
        {/* Dark bar */}
        <div className="pdf-header-bar">
          <div className="pdf-logo-row">
            <img className="pdf-bear" src="https://cdn.prod.website-files.com/680c4e282fbc1c583a3a7cc2/69a4a9e940d2f6303215cd3e_OVBear%20(1).png" alt="" />
            <img className="pdf-wordmark" src="https://cdn.prod.website-files.com/680c4e282fbc1c583a3a7cc2/69a217c4cdb0cf7f735453d5_2.png" alt="Ogden Valley Builders" />
          </div>
          <div className="pdf-contact-right">
            <div className="pdf-contact-line">(385) 288-7921  ·  info@ogdenvalleybuilders.com</div>
            <div className="pdf-contact-line">Weber & Morgan County, UT  ·  GC #14219939-5501</div>
          </div>
        </div>

        <div className="pdf-eyebrow">Rough Budget Estimate</div>
        <div className="pdf-project-name">{displayName}</div>

        {/* Meta row */}
        <div className="pdf-meta-grid">
          <div className="pdf-meta-cell">
            <div className="pdf-meta-label">Date</div>
            <div className="pdf-meta-value">{today}</div>
          </div>
          <div className="pdf-meta-cell">
            <div className="pdf-meta-label">Project Type</div>
            <div className="pdf-meta-value">{typeData ? typeData.label : '—'}</div>
          </div>
          <div className="pdf-meta-cell">
            <div className="pdf-meta-label">Finish Level</div>
            <div className="pdf-meta-value">{levelData ? levelData.label : '—'}</div>
          </div>
          <div className="pdf-meta-cell">
            <div className="pdf-meta-label">Square Footage</div>
            <div className="pdf-meta-value">{sf > 0 ? sf.toLocaleString() + ' SF' : '—'}</div>
          </div>
        </div>

        {/* Hero */}
        {calc && (
          <div className="pdf-hero">
            <div>
              <div className="pdf-hero-eyebrow">Total Estimated Budget Range</div>
              <div className="pdf-hero-range">{fmt(calc.totalLow)}<br />– {fmt(calc.totalHigh)}</div>
              <div className="pdf-hero-mid">Midpoint ~{fmt(calc.totalMid)}</div>
            </div>
            <div className="pdf-hero-right">
              <div className="pdf-psf-label">All-In / SF</div>
              <div className="pdf-psf-value">{fmt(calc.psfLow)} – {fmt(calc.psfHigh)}</div>
            </div>
          </div>
        )}

        {/* Breakdown */}
        {calc && (
          <>
            <div className="pdf-sec-label" style={{ marginTop: calc ? 0 : 22 }}>Cost Breakdown</div>
            <div className="pdf-row">
              <span className="pdf-row-label">Hard Costs ({levelData ? levelData.label : ''} · {sf.toLocaleString()} SF)</span>
              <span className="pdf-row-value">{fmtR(calc.hardLow, calc.hardHigh)}</span>
            </div>
            <div className="pdf-row">
              <span className="pdf-row-label">Contingency ({calc.contPct}%)</span>
              <span className="pdf-row-value">{fmtR(calc.contLow, calc.contHigh)}</span>
            </div>
            <div className="pdf-row subtotal">
              <span className="pdf-row-label">Subtotal</span>
              <span className="pdf-row-value">{fmtR(calc.subLow, calc.subHigh)}</span>
            </div>
            <div className="pdf-row fee">
              <span className="pdf-row-label">OVB Cost Plus Fee ({calc.feeRate}%)</span>
              <span className="pdf-row-value">{fmtR(calc.feeLow, calc.feeHigh)}</span>
            </div>
            <div className="pdf-total-bar">
              <span className="pdf-total-label">Total Budget Range</span>
              <span className="pdf-total-value">{fmt(calc.totalLow)} – {fmt(calc.totalHigh)}</span>
            </div>
          </>
        )}

        {/* Scope notes */}
        {scopeNotes && (
          <>
            <div className="pdf-sec-label">Project Scope Notes</div>
            <div className="pdf-scope-box" style={{ marginBottom: 22 }}>{scopeNotes}</div>
          </>
        )}

        {/* Modifiers */}
        {calc && calc.appliedMods.length > 0 && (
          <div style={{ marginBottom: 22 }}>
            <div className="pdf-sec-label">Scope Adjustments Applied</div>
            {calc.appliedMods.map(m => (
              <div key={m.key} className="pdf-mod-item">
                <div className={`pdf-mod-dot${m.negative ? ' negative' : ''}`} />
                {m.label}
                <span className={`pdf-mod-badge${m.negative ? ' negative' : ''}`}>{m.badge}</span>
              </div>
            ))}
          </div>
        )}

        {/* Why OVB */}
        <div className="pdf-value-grid">
          <div className="pdf-value-card">
            <div className="pdf-value-icon">📖</div>
            <div className="pdf-value-title">Open-Book Pricing</div>
            <div className="pdf-value-desc">Every invoice and receipt visible. No markups hidden in sub bids.</div>
          </div>
          <div className="pdf-value-card">
            <div className="pdf-value-icon">🛡️</div>
            <div className="pdf-value-title">36-Month Warranty</div>
            <div className="pdf-value-desc">3× the Utah standard. We stand behind our work long after closeout.</div>
          </div>
          <div className="pdf-value-card">
            <div className="pdf-value-icon">📍</div>
            <div className="pdf-value-title">Local Expertise</div>
            <div className="pdf-value-desc">Weber & Morgan County specialists. Licensed, insured, community-rooted.</div>
          </div>
        </div>

        {/* Footer */}
        <div className="pdf-footer">
          <div className="pdf-disclaimer">
            Rough budget estimate only — not a contract or cost guarantee. Final project costs determined through full scope review and formal estimate. Based on 2026 Weber/Morgan County, UT construction data. OVB Cost Plus Fee per current fee schedule. GC License #14219939-5501.
          </div>
          <div className="pdf-footer-right">
            <div className="pdf-footer-url">ogdenvalleybuilders.com</div>
            <div className="pdf-footer-phone">(385) 288-7921</div>
          </div>
        </div>
      </div>
    );
  }

  function App() {
    const [projectType, setProjectType] = useState('');
    const [sqft,        setSqft]        = useState('');
    const [finishLevel, setFinishLevel] = useState('');
    const [activeMods,  setActiveMods]  = useState({});
    const [contingency, setContingency] = useState('');
    const [clientName,  setClientName]  = useState('');
    const [scopeNotes,  setScopeNotes]  = useState('');
    const [downloading, setDownloading] = useState(false);

    const typeData  = projectType ? PSF[projectType] : null;
    const levelData = typeData && finishLevel ? typeData.levels.find(l => l.value === finishLevel) : null;
    const sf        = parseFloat(sqft) || 0;
    const contPct   = contingency !== '' ? (parseFloat(contingency) || 0) : (typeData ? typeData.defaultContingency : 0);
    const calc      = compute(typeData, levelData, sf, contPct, activeMods);

    const handleTypeChange = t => { setProjectType(t); setFinishLevel(''); setActiveMods({}); setContingency(''); };
    const toggleMod        = key => setActiveMods(prev => ({ ...prev, [key]: !prev[key] }));
    const handleReset      = () => { setProjectType(''); setSqft(''); setFinishLevel(''); setActiveMods({}); setContingency(''); setClientName(''); setScopeNotes(''); };

    const handleDownload = async () => {
      const el = document.getElementById('pdf-output');
      if (!el || !calc) return;
      setDownloading(true);
      const slug = clientName ? clientName.trim().replace(/\s+/g, '-') : 'Project';
      try {
        await html2pdf().set({
          margin: 0,
          filename: `${slug}—Rough-Budget—OVB.pdf`,
          image: { type: 'jpeg', quality: 0.97 },
          html2canvas: { scale: 2, useCORS: true, letterRendering: true },
          jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
          pagebreak: { mode: ['avoid-all'] },
        }).from(el).save();
      } catch(e) { console.error(e); }
      setDownloading(false);
    };

    return (
      <div>
        <div className="header">
          <a href="/" className="header-back">← Tools</a>
          <div className="header-center">
            <div className="header-title">Rough Budget Calculator</div>
            <div className="header-sub">Weber / Morgan County · 2026</div>
          </div>
          <div style={{ width: 64 }} />
        </div>

        <div className="layout">
          {/* INPUTS */}
          <div>
            <div className="section">
              <div className="section-header"><div className="section-num">1</div><div className="section-title">Project Info</div></div>
              <div className="section-body">
                <div className="field">
                  <label>Client Name</label>
                  <input type="text" placeholder="Last name or full name" value={clientName} onChange={e => setClientName(e.target.value)} />
                </div>
                <div className="field">
                  <label>Project Type</label>
                  <div className="pill-group">
                    {Object.entries(PSF).map(([key, d]) => (
                      <button key={key} className={`pill${projectType === key ? ' active' : ''}`} onClick={() => handleTypeChange(key)}>{d.icon} {d.label}</button>
                    ))}
                  </div>
                </div>
                {typeData && (<>
                  <div className="divider" />
                  <div className="field-row">
                    <div className="field">
                      <label>Square Footage</label>
                      <input type="text" inputMode="numeric" placeholder="e.g. 2400" value={sqft} onChange={e => setSqft(e.target.value.replace(/[^0-9.]/g, ''))} />
                    </div>
                    <div className="field">
                      <label>Contingency %{!contingency ? ` (default: ${typeData.defaultContingency}%)` : ''}</label>
                      <input type="text" inputMode="decimal" placeholder={String(typeData.defaultContingency)} value={contingency} onChange={e => setContingency(e.target.value.replace(/[^0-9.]/g, ''))} />
                    </div>
                  </div>
                  <div className="field">
                    <label>Finish Level</label>
                    <div className="pill-group">
                      {typeData.levels.map(lv => (
                        <button key={lv.value} className={`pill${finishLevel === lv.value ? ' active' : ''}`} onClick={() => setFinishLevel(lv.value)}>{lv.label}</button>
                      ))}
                    </div>
                    {levelData && <div className="level-desc">{levelData.desc} · ${levelData.low}–${levelData.high}/SF base</div>}
                  </div>
                </>)}
              </div>
            </div>

            {typeData && (
              <div className="section">
                <div className="section-header"><div className="section-num">2</div><div className="section-title">Scope Modifiers</div></div>
                <div className="section-body">
                  {typeData.modifiers.map(key => {
                    const mod = MODIFIERS[key];
                    const isChecked = !!activeMods[key];
                    return (
                      <div key={key} className={`modifier-row${isChecked ? ' checked' : ''}`} onClick={() => toggleMod(key)}>
                        <div className="mod-check"><div className="check-mark" /></div>
                        <div className="mod-label">{mod.label}</div>
                        <div className={`mod-badge${mod.negative ? ' negative' : ''}`}>{mod.badge}</div>
                      </div>
                    );
                  })}
                  <div className="mod-note">Percentage modifiers stack on hard costs. Flat modifiers add after PSF calculation. Green badges reduce the estimate.</div>
                </div>
              </div>
            )}

            <div className="section">
              <div className="section-header"><div className="section-num">3</div><div className="section-title">Scope Notes (optional)</div></div>
              <div className="section-body">
                <div className="field">
                  <label>Appears on the PDF under "Project Scope Notes"</label>
                  <textarea placeholder="Key scope items, inclusions, exclusions, client's described vision..." value={scopeNotes} onChange={e => setScopeNotes(e.target.value)} />
                </div>
              </div>
            </div>
          </div>

          {/* PREVIEW */}
          <div className="preview-col">
            <div className="preview-header">
              <span className="preview-label">PDF Preview</span>
              <button className="btn-dl-top" onClick={handleDownload} disabled={!calc || downloading}>
                {downloading ? '⏳ Generating...' : '↓ Download PDF'}
              </button>
            </div>
            <div className="paper-wrap">
              {!calc
                ? <div className="paper-empty"><div className="paper-empty-icon">📄</div><div className="paper-empty-text">Select project type, enter SF,<br />and choose a finish level<br />to generate the PDF.</div></div>
                : <PdfDoc clientName={clientName} sqft={sqft} finishLevel={finishLevel} scopeNotes={scopeNotes} calc={calc} typeData={typeData} levelData={levelData} />
              }
            </div>
          </div>
        </div>

        {/* Bottom bar */}
        <div className="bottom-bar">
          <a href="/" className="btn-back-bar">← Tools</a>
          <div className="btn-right">
            <button className="btn-reset" onClick={handleReset}>Reset</button>
            <button className="btn-dl-bar" onClick={handleDownload} disabled={!calc || downloading}>
              {downloading ? 'Generating...' : '↓ Download PDF'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
