<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="OVB Tools" />
<meta name="theme-color" content="#1A1F2E" />
<link rel="apple-touch-icon" href="https://cdn.prod.website-files.com/680c4e282fbc1c583a3a7cc2/69a4a9e940d2f6303215cd3e_OVBear%20(1).png" />
<title>Master Sub Agreement — OVB Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --near-black: #1E1C1A;
    --brand-tan: #C7AA8B;
    --smoke: #F7F7F7;
    --footer-black: #141210;
    --card-dark: #2A2826;
    --border: rgba(199,170,139,0.12);
    --warn-red: #D4714A;
    --bg: #1A1F2E;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--smoke);
    color: var(--near-black);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--near-black);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .bear-wrap { width: 36px; height: 36px; flex-shrink: 0; filter: brightness(1.1); }
  .bear-wrap img { width: 100%; height: 100%; object-fit: contain; mix-blend-mode: screen; }
  .header-title { flex: 1; }
  .header-title h1 { font-size: 14px; font-weight: 600; color: #F7F7F7; letter-spacing: 0.02em; }
  .header-title p { font-size: 11px; color: var(--brand-tan); font-family: 'DM Mono', monospace; margin-top: 1px; }
  .back-link { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--brand-tan); text-decoration: none; opacity: 0.7; transition: opacity 0.15s; }
  .back-link:hover { opacity: 1; }

  /* ── LAYOUT ── */
  .workspace {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    min-height: calc(100vh - 61px - 60px);
  }

  /* ── FORM PANEL ── */
  .form-panel {
    background: #fff;
    border-right: 1px solid #E8E4E0;
    padding: 24px 20px 100px;
    overflow-y: auto;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--near-black);
    opacity: 0.45;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: #E8E4E0; }

  .section-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 4px;
    background: var(--near-black);
    color: var(--brand-tan);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--near-black);
    margin-bottom: 5px;
    letter-spacing: 0.01em;
  }
  .form-group input, .form-group select {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid #E0DBD5;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--near-black);
    background: #fff;
    transition: border-color 0.15s;
    outline: none;
    -webkit-appearance: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--brand-tan); }
  .form-group input::placeholder { color: #BDB8B2; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .form-section { margin-bottom: 24px; }
  .form-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--near-black);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #E8E4E0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    background: #EDEAE6;
    padding: 24px;
    overflow-y: auto;
    padding-bottom: 100px;
  }
  .preview-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--near-black);
    opacity: 0.5;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .preview-badge {
    background: var(--near-black);
    color: var(--brand-tan);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 9px;
    font-family: 'DM Mono', monospace;
  }

  /* ── DOCUMENT ── */
  .doc-sheet {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.10);
    padding: 52px 56px;
    max-width: 820px;
    margin: 0 auto;
    font-size: 11.5px;
    line-height: 1.7;
    color: #1A1816;
  }
  .doc-header { text-align: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 2px solid var(--near-black); }
  .doc-header .doc-logo { margin-bottom: 12px; }
  .doc-header .doc-logo img { height: 22px; opacity: 0.85; }
  .doc-header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--near-black);
    margin-bottom: 4px;
  }
  .doc-header .doc-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    color: var(--brand-tan);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .parties-block {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
    padding: 16px;
    background: #F9F7F5;
    border-radius: 4px;
    border: 1px solid #E8E4E0;
  }
  .party-col { }
  .party-role {
    font-family: 'DM Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--brand-tan);
    margin-bottom: 5px;
  }
  .party-name { font-size: 12px; font-weight: 600; color: var(--near-black); margin-bottom: 2px; }
  .party-detail { font-size: 10.5px; color: #6B6560; line-height: 1.6; }

  .recitals {
    font-size: 11px;
    color: #4A4540;
    margin-bottom: 24px;
    padding: 14px 16px;
    border-left: 3px solid var(--brand-tan);
    background: #FBF9F7;
    border-radius: 0 4px 4px 0;
    line-height: 1.65;
  }

  .doc-section { margin-bottom: 20px; }
  .doc-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--near-black);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .doc-section-num {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    background: var(--near-black);
    color: var(--brand-tan);
    padding: 1px 6px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .doc-section p { margin-bottom: 8px; font-size: 11.5px; }
  .doc-section ul { padding-left: 18px; margin-bottom: 8px; }
  .doc-section ul li { margin-bottom: 4px; font-size: 11.5px; }
  .doc-section .sub-head { font-weight: 600; font-size: 11px; margin-bottom: 4px; margin-top: 10px; color: var(--near-black); }
  .doc-section .inline-bold { font-weight: 600; }
  .doc-section .warning-text { color: var(--warn-red); font-weight: 600; }

  .sig-section {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 2px solid var(--near-black);
  }
  .sig-section .sig-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--brand-tan);
    margin-bottom: 20px;
    text-align: center;
  }
  .sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .sig-block { }
  .sig-party {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--near-black);
    margin-bottom: 12px;
  }
  .sig-line {
    border-bottom: 1.5px solid var(--near-black);
    margin-bottom: 6px;
    height: 32px;
  }
  .sig-field { font-size: 10px; color: #6B6560; margin-bottom: 10px; }
  .sig-field span { font-weight: 600; color: var(--near-black); }

  .doc-footer {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid #E8E4E0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .doc-footer-left { font-family: 'DM Mono', monospace; font-size: 9px; color: #B0ABA5; }
  .doc-footer-right { font-family: 'DM Mono', monospace; font-size: 9px; color: #B0ABA5; }

  .placeholder-text { color: #BDB8B2; font-style: italic; }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: #fff;
    border-top: 1px solid #E8E4E0;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 24px;
    gap: 10px;
    z-index: 100;
  }
  .btn {
    height: 36px;
    padding: 0 20px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
    border: none;
  }
  .btn-reset {
    background: transparent;
    border: 1.5px solid var(--brand-tan);
    color: var(--brand-tan);
  }
  .btn-reset:hover { background: var(--brand-tan); color: var(--near-black); }
  .btn-print {
    background: var(--near-black);
    color: var(--brand-tan);
    border: 1.5px solid var(--near-black);
  }
  .btn-print:hover { background: var(--brand-tan); color: var(--near-black); border-color: var(--brand-tan); }
  .btn-print:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-print:disabled:hover { background: var(--near-black); color: var(--brand-tan); border-color: var(--near-black); }

  .completeness-bar {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .completeness-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #9A9590;
  }
  .completeness-track {
    width: 120px;
    height: 4px;
    background: #E8E4E0;
    border-radius: 4px;
    overflow: hidden;
  }
  .completeness-fill {
    height: 100%;
    background: var(--brand-tan);
    border-radius: 4px;
    transition: width 0.3s ease;
  }
  .completeness-fill.complete { background: #5A9E6B; }

  /* ── PRINT ── */
  @media print {
    body { background: #fff; }
    .header, .form-panel, .preview-panel > .preview-label, .bottom-bar { display: none !important; }
    .workspace { display: block; }
    .preview-panel { background: #fff; padding: 0; }
    .doc-sheet {
      box-shadow: none;
      padding: 0;
      max-width: 100%;
      margin: 0;
      font-size: 11px;
    }
    .doc-header { padding-bottom: 16px; margin-bottom: 24px; }
    .doc-section { margin-bottom: 14px; page-break-inside: avoid; }
    .sig-section { page-break-before: always; }
    .placeholder-text { color: #999; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

const INITIAL = {
  subCompany: '',
  ownerName: '',
  ownerTitle: 'Owner',
  license: '',
  licenseType: 'Utah Contractor License',
  phone: '',
  email: '',
  agreementDate: new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }),
};

function fmt(val, placeholder) {
  if (!val || !val.trim()) return <span className="placeholder-text">{placeholder}</span>;
  return val;
}

function DocText({ data }) {
  const d = data;
  const today = d.agreementDate || '_______________';

  return (
    <div className="doc-sheet" id="doc-print">

      <div className="doc-header">
        <div className="doc-logo">
          <img src="https://cdn.prod.website-files.com/680c4e282fbc1c583a3a7cc2/69a26b5c1e04a9c1861888f1_1.png" alt="Ogden Valley Builders" />
        </div>
        <h1>Master Subcontractor Agreement</h1>
        <div className="doc-subtitle">Ogden Valley Builders, LLC &nbsp;·&nbsp; Weber &amp; Morgan County, Utah</div>
      </div>

      <div className="parties-block">
        <div className="party-col">
          <div className="party-role">Contractor</div>
          <div className="party-name">Ogden Valley Builders, LLC</div>
          <div className="party-detail">
            GC License #14219939-5501<br />
            Weber &amp; Morgan County, Utah<br />
            (385) 288-7921<br />
            info@ogdenvalleybuilders.com
          </div>
        </div>
        <div className="party-col">
          <div className="party-role">Subcontractor</div>
          <div className="party-name">{fmt(d.subCompany, 'Company Name')}</div>
          <div className="party-detail">
            {d.licenseType}: {fmt(d.license, 'License #')}<br />
            {fmt(d.ownerName, 'Owner / Principal')}, {d.ownerTitle}<br />
            {fmt(d.phone, 'Phone')}<br />
            {fmt(d.email, 'Email')}
          </div>
        </div>
      </div>

      <div className="recitals">
        This Master Subcontractor Agreement ("Agreement") is entered into as of {today}, by and between Ogden Valley Builders, LLC ("Contractor") and {fmt(d.subCompany, '[Subcontractor Company]')} ("Subcontractor"). This Agreement governs all work Subcontractor performs for Contractor on any project and shall remain in effect until terminated in writing by either party. Project-specific scope, contract value, schedule, payment milestones, and trade-specific workmanship standards are set forth in each applicable Project Purchase Order and Bid Request, which are incorporated into and governed by this Agreement.
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">01</span> Independent Contractor Relationship</div>
        <p>Subcontractor is an independent contractor and not an employee, agent, partner, or representative of Contractor. Subcontractor is solely responsible for all federal, state, and local taxes, payroll obligations, workers' compensation coverage, unemployment insurance, and employee benefits for their workers and agents. Subcontractor shall not hold themselves out as an employee or agent of Contractor, and no agency, partnership, joint venture, or employment relationship is created by this Agreement.</p>
        <p>Notwithstanding the foregoing, Subcontractor acknowledges that they represent Contractor's brand, reputation, and standard of quality on every jobsite, and shall conduct themselves and their employees accordingly at all times.</p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">02</span> Scope of Work &amp; Contract Documents</div>
        <p>For each project, Contractor will issue a Project Purchase Order ("PO") specifying the project address, approved scope of work, contract value, schedule, and applicable Bid Request. Each PO is incorporated into and governed by this Agreement. Subcontractor shall furnish all labor, materials, equipment, tools, transportation, and supervision necessary to complete each project per the Contract Documents, which include this Agreement, the applicable PO, Bid Request terms and conditions, plans, specifications, applicable building codes, and all written modifications executed by both parties.</p>
        <p>Subcontractor is responsible for reviewing all Contract Documents and site conditions before commencing work. Any exclusions, conflicts, or discrepancies must be identified in writing before work begins. Failure to identify conflicts does not relieve Subcontractor of responsibility to complete the work in accordance with governing codes and Contract Documents.</p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">03</span> Change Orders &amp; Extra Work</div>
        <p>No work outside the approved Scope of Work shall be performed without a written Change Order signed by Contractor's authorized representative. <span className="inline-bold">Verbal authorizations are invalid and will not be honored for payment under any circumstances.</span> Work performed without a written, executed Change Order may be deemed unauthorized and may not be compensated. Contractor reserves the right to require removal of unauthorized work at Subcontractor's sole expense, with no compensation for labor or materials expended.</p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">04</span> Insurance Requirements</div>
        <p>Subcontractor shall procure and maintain, at Subcontractor's sole expense, the following minimum insurance coverage throughout the term of this Agreement and on every project, without gap or lapse:</p>
        <ul>
          <li><span className="inline-bold">Commercial General Liability:</span> $1,000,000 per occurrence / $2,000,000 aggregate</li>
          <li><span className="inline-bold">Automobile Liability:</span> $1,000,000 combined single limit</li>
          <li><span className="inline-bold">Workers' Compensation:</span> Statutory limits as required by Utah law</li>
          <li><span className="inline-bold">Employer's Liability:</span> $1,000,000 per occurrence</li>
        </ul>
        <div className="sub-head">Additional Insured &amp; Waiver of Subrogation</div>
        <p>Ogden Valley Builders, LLC and the project Owner shall be named as Additional Insureds on all commercial general liability policies. All policies shall include a waiver of subrogation in favor of Contractor and Owner.</p>
        <div className="sub-head">Certificates of Insurance</div>
        <p>Subcontractor shall provide current Certificates of Insurance to Contractor before commencing work on any project and shall maintain current certificates on file at all times. Subcontractor shall provide not less than thirty (30) days' prior written notice to Contractor of cancellation, non-renewal, or material change to any required policy. <span className="warning-text">Failure to maintain required insurance is grounds for immediate termination from all active projects.</span> Contractor reserves the right to verify coverage directly with Subcontractor's insurer at any time.</p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">05</span> Indemnification &amp; Liability</div>
        <p>To the fullest extent permitted by applicable law, Subcontractor shall <span className="inline-bold">defend, indemnify, and hold harmless</span> Ogden Valley Builders, LLC, its members, officers, employees, and agents, and the project Owner from and against any and all claims, damages, losses, liabilities, costs, and expenses (including reasonable attorneys' fees and court costs) arising out of or resulting from:</p>
        <ul>
          <li>Subcontractor's performance or failure to perform any work under this Agreement</li>
          <li>Negligent acts, errors, or omissions of Subcontractor or their employees, agents, or sub-subcontractors</li>
          <li>Bodily injury, death, or property damage caused by Subcontractor's operations</li>
          <li>Violations of any applicable laws, codes, regulations, or safety standards by Subcontractor</li>
          <li>Liens, claims, or stop notices arising from Subcontractor's work, labor, or materials</li>
          <li>Defects in workmanship or materials provided by Subcontractor</li>
          <li>Damage to Owner's or Contractor's property, finishes, or equipment during Subcontractor's operations</li>
        </ul>
        <p>This indemnification obligation shall survive termination or completion of this Agreement and shall not be limited by any workers' compensation, employer's liability, or other insurance maintained by Subcontractor. Subcontractor's liability under this Agreement is not capped by the contract value of any individual project.</p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">06</span> Lien Waivers &amp; Claims</div>
        <p>Subcontractor shall keep all projects and property free from all liens, claims, and encumbrances arising from Subcontractor's work, labor, materials, or sub-subcontractors. Subcontractor shall:</p>
        <ul>
          <li>Provide a conditional lien waiver with each progress payment request</li>
          <li>Provide an unconditional final lien waiver upon receipt of final payment</li>
          <li>Provide lien waivers from all material suppliers and sub-subcontractors upon request</li>
          <li>Comply with all applicable Utah lien law requirements including required preliminary notices</li>
          <li>Indemnify and defend Contractor and Owner from any liens or claims arising from Subcontractor's work</li>
        </ul>
        <p>Failure to provide required lien waivers shall result in withholding of all payment until fully executed waivers are received.</p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">07</span> Payment Conditions</div>
        <p>Project-specific payment schedules and milestones are defined in the applicable Bid Request and PO. All payments under this Agreement are contingent upon:</p>
        <ul>
          <li>Submittal of a proper invoice with supporting documentation</li>
          <li>Execution of all required conditional or unconditional lien waivers</li>
          <li>Current, valid insurance certificates on file with Contractor</li>
          <li>Executed W-9 on file with Contractor</li>
          <li>Work completed to Contractor's satisfaction and in full compliance with Contract Documents</li>
          <li>Completion of all required cleanup, debris removal, and site restoration</li>
          <li>Full compliance with all terms of this Agreement</li>
        </ul>
        <p>Payment shall be issued within five (5) business days of invoice approval and satisfaction of all payment conditions. Contractor reserves the right to withhold payment for incomplete, defective, or non-compliant work until fully corrected at Subcontractor's sole expense. Missing or incomplete documentation may delay payment without constituting a breach by Contractor.</p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">08</span> Workmanship &amp; Quality Standards</div>
        <p>Subcontractor warrants that all work shall be performed in a professional and workmanlike manner, free from defects in materials and workmanship, and in strict compliance with all applicable building codes (IRC, IBC, and local amendments), manufacturer installation specifications, industry best practices, and the trade-specific standards set forth in each applicable Bid Request.</p>
        <p>Subcontractor shall correct all defective work, failed inspections, or non-compliant work at no additional cost to Contractor or Owner. Subcontractor shall respond to written deficiency notices within forty-eight (48) hours and complete all corrections within five (5) business days of notice. Failure to respond or correct within these timeframes entitles Contractor to engage another contractor to complete corrections and backcharge Subcontractor for all costs incurred plus a fifteen percent (15%) administrative fee.</p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">09</span> Site Conduct, Cleanliness &amp; Property Protection</div>
        <p>Subcontractor and all their employees and agents shall at all times maintain professional conduct and appearance on the jobsite, and represent Contractor's brand with integrity. Subcontractor shall:</p>
        <ul>
          <li>Protect all existing finishes, fixtures, flooring, landscaping, and Owner's personal property</li>
          <li>Maintain daily site cleanliness and remove all debris, waste, and excess materials each workday</li>
          <li>Leave the jobsite broom-clean at the end of each workday without exception</li>
          <li>Repair all damage caused by Subcontractor's operations at no cost to Contractor or Owner</li>
          <li>Not contact Owner directly without express written authorization from Contractor</li>
          <li>Coordinate all scheduling, changes, and deviations through Contractor only</li>
        </ul>
        <p><span className="inline-bold">Backcharge Provision:</span> Failure to maintain cleanliness or protect property may result in backcharges of a minimum $150–$250 per occurrence. Contractor may remedy failures directly and backcharge Subcontractor for all costs plus a fifteen percent (15%) administrative fee without prior notice.</p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">10</span> Safety &amp; OSHA Compliance</div>
        <p>Subcontractor shall comply with all applicable federal, state, and local safety regulations, including all OSHA standards applicable to their trade and all work performed under this Agreement. Subcontractor shall provide all required personal protective equipment to their employees, maintain a safe work environment, implement all required safety measures and fall protection, and report all accidents, injuries, or incidents to Contractor immediately. Subcontractor assumes sole and exclusive responsibility for all OSHA fines, penalties, citations, and costs resulting from Subcontractor's safety violations, including any fines assessed against Contractor as a result of Subcontractor's non-compliance.</p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">11</span> Communication Protocol</div>
        <p>All project communications, scheduling, pricing, change orders, and technical matters shall be directed exclusively through the JobTread project management portal or Contractor's designated project manager. <span className="warning-text">Subcontractor shall not contact the project Owner directly regarding any matter without Contractor's express prior written authorization. Unauthorized Owner contact is grounds for immediate termination of this Agreement and removal from all active projects.</span></p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">12</span> Warranty</div>
        <p>Subcontractor warrants all labor and workmanship for a minimum of one (1) year from the date of substantial completion of each project, unless a longer period is specified in the applicable Bid Request. Subcontractor shall respond to warranty claims within forty-eight (48) hours of notification and complete all warranty repairs within five (5) business days. Failure to respond or make timely repairs entitles Contractor to complete warranty work by other means and backcharge Subcontractor for all costs plus a fifteen percent (15%) administrative fee.</p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">13</span> Flow-Down Provisions</div>
        <p>Subcontractor agrees to be bound by all applicable terms and conditions of Contractor's Prime Agreement with the project Owner, to the extent applicable to Subcontractor's scope of work, including but not limited to insurance requirements, indemnification obligations, dispute resolution procedures, scheduling requirements, and quality standards. Subcontractor acknowledges awareness that they occupy a critical role in fulfilling Contractor's obligations to the Owner.</p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">14</span> Termination</div>
        <p>Contractor may terminate this Agreement and/or remove Subcontractor from any active project immediately and without prior notice for cause, including but not limited to:</p>
        <ul>
          <li>Non-compliance with any material term of this Agreement</li>
          <li>Safety violations or failure to comply with applicable OSHA regulations</li>
          <li>Poor workmanship or failure to meet applicable industry standards or code requirements</li>
          <li>Unprofessional conduct or failure to represent Contractor's brand appropriately</li>
          <li>Failure to maintain required insurance coverage at any time</li>
          <li>Failure to execute required lien waivers upon payment</li>
          <li>Unauthorized direct contact with project Owner</li>
          <li>Abandonment of any project or work stoppage without authorization</li>
          <li>Insolvency, bankruptcy, or assignment for the benefit of creditors</li>
        </ul>
        <p>Upon termination for cause, Contractor may complete the work by other means and backcharge Subcontractor for all costs incurred above the original contract value, including overhead and a reasonable markup. Termination for cause shall not relieve Subcontractor of any indemnification, warranty, or lien obligations under this Agreement.</p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">15</span> Dispute Resolution</div>
        <p>Any dispute arising under or related to this Agreement shall first be subject to good-faith negotiation between the parties for a minimum period of fifteen (15) days from written notice of the dispute. If negotiation fails to resolve the dispute, it shall be submitted to binding arbitration administered by the American Arbitration Association in accordance with its Construction Industry Arbitration Rules. The arbitrator's award shall be final and binding and may be entered as a judgment in any court of competent jurisdiction. The prevailing party shall be entitled to recover reasonable attorneys' fees and costs. Venue for all proceedings shall be in Weber County, Utah.</p>
      </div>

      <div className="doc-section">
        <div className="doc-section-title"><span className="doc-section-num">16</span> Miscellaneous Provisions</div>
        <ul>
          <li><span className="inline-bold">Governing Law:</span> This Agreement shall be governed by the laws of the State of Utah.</li>
          <li><span className="inline-bold">Entire Agreement:</span> This Agreement constitutes the entire agreement between the parties and supersedes all prior negotiations, representations, or agreements, oral or written.</li>
          <li><span className="inline-bold">Modifications:</span> No modification or amendment shall be valid unless in writing and signed by authorized representatives of both parties.</li>
          <li><span className="inline-bold">Severability:</span> If any provision is found invalid or unenforceable, the remainder shall remain in full force and effect.</li>
          <li><span className="inline-bold">Assignment:</span> Subcontractor may not assign this Agreement or any rights or obligations hereunder without prior written consent of Contractor.</li>
          <li><span className="inline-bold">Waiver:</span> Failure to enforce any provision on any occasion shall not constitute a waiver of that or any other provision.</li>
          <li><span className="inline-bold">Counterparts:</span> This Agreement may be executed in counterparts, including electronically, each of which shall constitute an original.</li>
          <li><span className="inline-bold">Survival:</span> Sections covering Indemnification, Insurance, Warranty, Liens, and Dispute Resolution survive termination or expiration of this Agreement.</li>
        </ul>
      </div>

      <div className="sig-section">
        <div className="sig-title">Acknowledgment &amp; Signatures</div>

        <div className="recitals" style={{marginBottom: '24px', fontSize: '10.5px'}}>
          By signing below, each party acknowledges that they have read, understood, and agree to be bound by all terms and conditions of this Master Subcontractor Agreement. Subcontractor represents that they have full legal authority to enter into this Agreement on behalf of their company, that all information provided is accurate and complete, and that this Agreement shall govern all work Subcontractor performs for Ogden Valley Builders, LLC unless modified in writing by authorized representatives of both parties.
        </div>

        <div className="sig-grid">
          <div className="sig-block">
            <div className="sig-party">Ogden Valley Builders, LLC</div>
            <div className="sig-line"></div>
            <div className="sig-field">Signature</div>
            <div className="sig-field"><span>Taylor Whitesides</span>, Owner</div>
            <div className="sig-field">GC License #14219939-5501</div>
            <div style={{marginTop: '20px'}}>
              <div className="sig-line"></div>
              <div className="sig-field">Date</div>
            </div>
          </div>
          <div className="sig-block">
            <div className="sig-party">{fmt(d.subCompany, 'Subcontractor Company')}</div>
            <div className="sig-line"></div>
            <div className="sig-field">Signature</div>
            <div className="sig-field"><span>{d.ownerName || '______________________'}</span>, {d.ownerTitle}</div>
            <div className="sig-field">{d.licenseType}: {d.license || '______________________'}</div>
            <div style={{marginTop: '20px'}}>
              <div className="sig-line"></div>
              <div className="sig-field">Date</div>
            </div>
          </div>
        </div>
      </div>

      <div className="doc-footer">
        <div className="doc-footer-left">Ogden Valley Builders, LLC · GC #14219939-5501 · Weber &amp; Morgan County, UT</div>
        <div className="doc-footer-right">Master Subcontractor Agreement · {today}</div>
      </div>

    </div>
  );
}

function App() {
  const [data, setData] = useState(INITIAL);

  const set = useCallback((field, val) => {
    setData(prev => ({ ...prev, [field]: val }));
  }, []);

  const reset = () => {
    if (window.confirm('Clear all fields and start over?')) {
      setData({...INITIAL, agreementDate: new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })});
    }
  };

  const fields = ['subCompany', 'ownerName', 'license', 'phone', 'email'];
  const filled = fields.filter(f => data[f] && data[f].trim()).length;
  const pct = Math.round((filled / fields.length) * 100);
  const isReady = filled === fields.length;

  const print = () => window.print();

  return (
    <>
      <div className="header">
        <a href="/" className="back-link">← Home</a>
        <div className="bear-wrap">
          <img src="https://cdn.prod.website-files.com/680c4e282fbc1c583a3a7cc2/69a4a9e940d2f6303215cd3e_OVBear%20(1).png" alt="" />
        </div>
        <div className="header-title">
          <h1>Master Subcontractor Agreement</h1>
          <p>Ogden Valley Builders, LLC — All Trades</p>
        </div>
      </div>

      <div className="workspace">
        {/* FORM */}
        <div className="form-panel">

          <div className="form-section">
            <div className="form-section-title">
              <span className="section-num">1</span>
              Subcontractor Details
            </div>

            <div className="form-group">
              <label>Company Name *</label>
              <input
                type="text"
                placeholder="ABC Framing, LLC"
                value={data.subCompany}
                onChange={e => set('subCompany', e.target.value)}
              />
            </div>

            <div className="form-row">
              <div className="form-group">
                <label>Owner / Principal *</label>
                <input
                  type="text"
                  placeholder="Full name"
                  value={data.ownerName}
                  onChange={e => set('ownerName', e.target.value)}
                />
              </div>
              <div className="form-group">
                <label>Title</label>
                <select value={data.ownerTitle} onChange={e => set('ownerTitle', e.target.value)}>
                  <option>Owner</option>
                  <option>President</option>
                  <option>Principal</option>
                  <option>Partner</option>
                  <option>Manager</option>
                  <option>Authorized Representative</option>
                </select>
              </div>
            </div>

            <div className="form-row">
              <div className="form-group">
                <label>License Type</label>
                <select value={data.licenseType} onChange={e => set('licenseType', e.target.value)}>
                  <option>Utah Contractor License</option>
                  <option>Utah General Contractor License</option>
                  <option>Utah Specialty Contractor License</option>
                  <option>Utah Electrical License</option>
                  <option>Utah Plumbing License</option>
                  <option>Utah HVAC License</option>
                  <option>Business License</option>
                </select>
              </div>
              <div className="form-group">
                <label>License # *</label>
                <input
                  type="text"
                  placeholder="12345678"
                  value={data.license}
                  onChange={e => set('license', e.target.value)}
                />
              </div>
            </div>

            <div className="form-group">
              <label>Phone *</label>
              <input
                type="tel"
                placeholder="(000) 000-0000"
                value={data.phone}
                onChange={e => set('phone', e.target.value)}
              />
            </div>

            <div className="form-group">
              <label>Email *</label>
              <input
                type="email"
                placeholder="name@company.com"
                value={data.email}
                onChange={e => set('email', e.target.value)}
              />
            </div>
          </div>

          <div className="form-section">
            <div className="form-section-title">
              <span className="section-num">2</span>
              Agreement Date
            </div>
            <div className="form-group">
              <label>Date of Agreement</label>
              <input
                type="text"
                value={data.agreementDate}
                onChange={e => set('agreementDate', e.target.value)}
              />
            </div>
          </div>

          <div style={{padding: '12px 14px', background: '#FBF9F7', border: '1px solid #E8E4E0', borderRadius: '4px', marginTop: '4px'}}>
            <div style={{fontFamily: "'DM Mono', monospace", fontSize: '9px', letterSpacing: '0.1em', textTransform: 'uppercase', color: '#9A9590', marginBottom: '6px'}}>After Signing</div>
            <div style={{fontSize: '11px', color: '#6B6560', lineHeight: 1.6}}>
              Print → Sign both copies → File sub's copy. Agreement covers all future projects. Issue project-specific scope via JobTread PO.
            </div>
          </div>

        </div>

        {/* PREVIEW */}
        <div className="preview-panel">
          <div className="preview-label">
            <span>Document Preview</span>
            <span className="preview-badge">Print-Ready</span>
          </div>
          <DocText data={data} />
        </div>
      </div>

      <div className="bottom-bar">
        <div className="completeness-bar">
          <div className="completeness-label">{isReady ? '✓ Ready to print' : `${filled}/${fields.length} required fields`}</div>
          <div className="completeness-track">
            <div className={`completeness-fill${isReady ? ' complete' : ''}`} style={{width: `${pct}%`}}></div>
          </div>
        </div>
        <button className="btn btn-reset" onClick={reset}>Reset</button>
        <button className="btn btn-print" onClick={print} disabled={!isReady}>Print Agreement</button>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
